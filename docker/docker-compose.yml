version: "3.8"

services:
  folderscope:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: folderscope-dev
    environment:
      - NODE_ENV=development
      - AI_KEY=${AI_KEY:-}
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    working_dir: /workspace
    command: npm run dev
    ports:
      - "3000:3000"

  lint:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: folderscope-lint
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    working_dir: /workspace
    command: npm run lint

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: folderscope-test
    volumes:
      - ..:/workspace
      - /workspace/node_modules
    working_dir: /workspace
    command: npm test
